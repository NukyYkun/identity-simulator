<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>重生体验馆</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=21">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- 烟雾粒子层 -->
  <canvas id="smokeCanvas"></canvas>

  <!-- 过渡层：色彩渐变 + 角色名 -->
  <div class="transition-overlay" id="transitionOverlay">
    <div class="trans-glow"></div>
    <div class="trans-content">
      <div class="trans-name" id="transName"></div>
      <div class="trans-era" id="transEra"></div>
    </div>
  </div>

  <!-- ====== 首页 ====== -->
  <div id="screen-home" class="screen active">
    <div class="home-content">
      <div class="silhouette-container">
        <div class="silhouette">
          <div class="silhouette-body"></div>
          <div class="silhouette-glow"></div>
        </div>
        <div class="silhouette-mist"></div>
      </div>

      <h1 class="home-title">重生体验馆</h1>
      <p class="home-subtitle">你即将成为另一个人</p>

      <div class="home-cta" onclick="startDraw()">
        <span class="cta-text">触碰命运</span>
        <span class="cta-line"></span>
      </div>

      <button class="btn-link archive-link" onclick="showScreen('collection');renderCollection()">前世档案</button>
    </div>
  </div>

  <!-- ====== 人生页 ====== -->
  <div id="screen-life" class="screen">
    <div class="life-content">
      <div class="life-header" id="lifeHeader"></div>
      <div class="timeline" id="timeline"></div>
      <div class="life-actions" id="lifeActions"></div>
    </div>
  </div>

  <!-- ====== 结局页 ====== -->
  <div id="screen-ending" class="screen">
    <div class="ending-content">
      <div class="ending-icon">— 终 —</div>
      <div class="ending-header">
        <h2 class="ending-name" id="endingName"></h2>
        <div class="ending-era" id="endingEra"></div>
      </div>
      <div class="ending-card">
        <div class="ending-summary" id="endingSummary"></div>
        <div class="ending-divider"></div>
        <div class="ending-history">
          <div class="ending-history-label">历史注脚</div>
          <div class="ending-history-text" id="endingHistory"></div>
        </div>
      </div>
      <div class="ending-actions">
        <button class="btn btn-primary" onclick="startDraw()">换一个人生</button>
        <button class="btn btn-secondary" onclick="replayLife()">重历此生</button>
        <button class="btn btn-ghost-center" onclick="showScreen('collection');renderCollection()">前世档案</button>
      </div>
    </div>
  </div>

  <!-- ====== 前世档案（收藏页） ====== -->
  <div id="screen-collection" class="screen">
    <div class="collection-content">
      <button class="collection-back-top" onclick="showScreen('home')" aria-label="返回">‹</button>
      <div class="collection-header">
        <h2 class="collection-title">前世档案</h2>
        <div class="collection-subtitle" id="collectionSubtitle">已集 0 / 51 人</div>
      </div>
<div class="tone-tabs-wrapper" id="toneTabsWrapper"><div class="tone-tabs" id="toneTabs"></div></div>
<div class="tone-panels" id="tonePanels"></div>
      <button class="btn-link collection-back" onclick="showScreen('home')"><span class="back-line"></span>归<span class="back-line"></span></button>
    </div>
  </div>

  <script src="data/characters.js"></script>
  <script src="app.js?v=21"></script>
</body>
</html>
